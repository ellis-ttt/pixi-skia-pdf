name: deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-skia:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-canvaskit.outputs.cache-hit }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: get skia submodule SHA
        id: skia-sha
        run: |
          SHA=$(git -C skia rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: get canvaskit
        id: cache-canvaskit
        uses: actions/cache@v4
        with:
          path: skia/out/canvaskit_wasm
          key: canvaskit-${{ steps.skia-sha.outputs.sha }}

      - name: deps
        if: steps.cache-canvaskit.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
              python3 python3-pip \
              ninja-build         \
              clang               \
              git                 \
              curl                \
              build-essential

      - name: depot_tools
        if: steps.cache-canvaskit.outputs.cache-hit != 'true'
        working-directory: skia
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ../depot_tools
          export PATH="$PWD/../depot_tools:$PATH"
          python3 tools/git-sync-deps

      - name: emscripten SDK
        if: steps.cache-canvaskit.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: skia/third_party/externals/emsdk
          key: emsdk-${{ steps.skia-sha.outputs.sha }}
          restore-keys: emsdk-

      - name: run emscripten
        if: steps.cache-canvaskit.outputs.cache-hit != 'true'
        working-directory: skia
        run: |
          export PATH="$PWD/../depot_tools:$PATH"
          bin/activate-emsdk
          third_party/externals/emsdk/emsdk_env.sh >> "$GITHUB_ENV" 2>/dev/null || true
          echo "EMSDK=$PWD/third_party/externals/emsdk" >> "$GITHUB_ENV"
          echo "$PWD/../depot_tools" >> "$GITHUB_PATH"

      - name: build canvaskit
        if: steps.cache-canvaskit.outputs.cache-hit != 'true'
        working-directory: skia/modules/canvaskit
        run: |
          bash compile.sh        \
              no_skottie=true    \
              no_particles=true  \
              no_sksl_trace=true \
              release

      - name: upload canvaskit
        uses: actions/upload-artifact@v4
        with:
          name: canvaskit
          path: |
            skia/out/canvaskit_wasm/canvaskit.js
            skia/out/canvaskit_wasm/canvaskit.wasm
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: build-skia

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: npm ci
        run: npm ci

      - name: download canvaskit
        uses: actions/download-artifact@v4
        with:
          name: canvaskit
          path: public/canvaskit

      - name: build
        run: npm run build

      - name: upload to pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: deploy to pages
        id: deployment
        uses: actions/deploy-pages@v4
